<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BINUS Medan Canteen</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

:root{
    --bg:#f5f8fa;
    --text:#333;
    --surface:#ffffff;
    --surface-alt:#f5f8fa;
    --accent:#00AEEF;
    --accent-strong:#0088bb;
    --header-bg:#00AEEF;
    --header-text:#ffffff;
    --card-shadow:0 4px 12px rgba(0,0,0,.08);
    --card-shadow-hover:0 8px 20px rgba(0,0,0,.12);
    --muted:#666;
    --muted-variant:#999;
    --footer-bg:#003366;
    --status-bg-cooking:#fff3cd;
    --status-bg-ready:#d4edda;
    --status-bg-unavailable:#f8d7da;
    --btn-bg:#FF6B6B;
    --btn-bg-hover:#FF5252;
}

[data-theme="dark"]{
    --bg:#121620;
    --text:#E5E9F0;
    --surface:#1C2430;
    --surface-alt:#16202b;
    --accent:#4CB8FF;
    --accent-strong:#2F8FE0;
    --header-bg:#0D1826;
    --header-text:#E5E9F0;
    --card-shadow:0 4px 16px rgba(0,0,0,.35);
    --card-shadow-hover:0 8px 24px rgba(0,0,0,.45);
    --muted:#B0B8C2;
    --muted-variant:#8B96A2;
    --footer-bg:#091424;
    --status-bg-cooking:#3D3F52;
    --status-bg-ready:#2A3A2B;
    --status-bg-unavailable:#4A2B2E;
    --btn-bg:#FF7F7F;
    --btn-bg-hover:#FF6464;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:var(--bg);
    color:var(--text);
}

/* HEADER */

header{
    background:var(--header-bg);
    color:var(--header-text);
    position:sticky;
    top:0;
    z-index:1000;
    padding:15px 8%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:20px;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:1.5rem;
    font-weight:700;
    white-space:nowrap;
    min-width:fit-content;
}

nav{
    flex:1;
    display:flex;
    justify-content:center;
}

nav ul{
    display:flex;
    list-style:none;
    gap:20px;
    align-items:center;
    margin:0;
    padding:0;
}

nav a{
    color:var(--header-text);
    text-decoration:none;
    font-weight:500;
    transition:0.3s;
    display:flex;
    align-items:center;
    gap:6px;
}

nav a:hover{
    color:#d9f4ff;
}

.header-right{
    display:flex;
    align-items:center;
    gap:30px;
    min-width:fit-content;
}

.profile{
    font-size:1.8rem;
    cursor:pointer;
    display:flex;
    align-items:center;
}

.theme-toggle{
    padding:8px;
    width:44px;
    height:44px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,.25);
    background:rgba(255,255,255,.08);
    color:var(--header-text);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:0.2s;
    font-size:1.1rem;
    line-height:1;
}

.theme-toggle:hover{
    background:rgba(255,255,255,.15);
}

.theme-toggle i{
    line-height:1;
}

/* HERO */

.hero{
    min-height:80vh;
    background:
    linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
    url('top-view-table-full-food_23-2149209251.avif');

    background-size:cover;
    background-position:center;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    padding:30px;
}

.hero-content h1{
    font-size:3rem;
    margin-bottom:15px;
}

.hero-content p{
    font-size:1.2rem;
    margin-bottom:10px;
}

.btn{
    display:inline-block;
    margin-top:20px;
    background:var(--btn-bg);
    color:white;
    text-decoration:none;
    padding:15px 35px;
    border-radius:8px;
    font-size:1.1rem;
    font-weight:600;
    border:none;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    background:var(--btn-bg-hover);
    transform:translateY(-2px);
    box-shadow:0 6px 20px rgba(255, 107, 107, 0.4);
}

/* SECTION */

section{
    padding:70px 8%;
}

.section-title{
    text-align:center;
    color:var(--accent);
    margin-bottom:40px;
    font-size:2rem;
}

/* TODAY MEAL DETAILS */

.today-meal-container{
    display:flex;
    gap:20px;
    align-items:flex-start;
}

.meal-image-section{
    flex:1;
    min-width:300px;
    margin-left:125px;
}

.meal-image{
    width:100%;
    max-width:400px;
    height:300px;
    object-fit:cover;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
}

.meal-info-section{
    flex:1;
}

.meal-name{
    font-size:1.8rem;
    color:var(--accent);
    margin-bottom:15px;
    font-weight:700;
    margin-right:100px;
    margin-left:-50px;
}

.meal-description{
    font-size:1rem;
    color:var(--muted);
    line-height:1.8;
    margin-bottom:25px;
    margin-right:100px;
    margin-left:-50px;
}

/* TODAY MENU ITEMS */

.today-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    margin-top:30px;
}

.menu-box{
    background:var(--surface);
    padding:20px;
    border-radius:15px;
    text-align:center;
    box-shadow:var(--card-shadow);
    transition:0.3s;
}

.menu-box:hover{
    transform:translateY(-5px);
    box-shadow:var(--card-shadow-hover);
}

.menu-box i{
    font-size:2rem;
    color:var(--accent);
    margin-bottom:15px;
}

.menu-box h3{
    color:var(--accent);
    margin-bottom:10px;
    font-size:1rem;
}

.menu-box p{
    color:var(--muted);
    font-size:0.9rem;
}

.cooking-status{
    margin-top:10px;
    padding:8px;
    border-radius:8px;
    font-size:0.8rem;
    font-weight:500;
}

.status-cooking{
    background:var(--status-bg-cooking);
    color:#856404;
}

.status-ready{
    background:var(--status-bg-ready);
    color:#155724;
}

.status-unavailable{
    background:var(--status-bg-unavailable);
    color:#721c24;
}

/* FEEDBACK */

.feedback{
    background:var(--surface);
}

.feedback-cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.feedback-card{
    padding:20px;
    border-radius:15px;
    background:var(--surface-alt);
}

.stars{
    color:gold;
    margin-bottom:10px;
}

.review-panel{
    max-width:700px;
    margin:0 auto 30px;
}

.review-form{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.review-submit{
    width:180px;
    align-self:flex-start;
}

.feedback-cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.review-card{
    background:var(--surface-alt);
    padding:20px;
    border-radius:15px;
    box-shadow:var(--card-shadow);
}

.review-meta{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
    font-size:0.9rem;
}

.review-meta strong{
    color:var(--accent);
}

.review-meta span{
    color:var(--muted);
}

.review-card p{
    line-height:1.6;
}

form{
    max-width:600px;
    margin:auto;
}

input, textarea{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid rgba(0,0,0,.12);
    border-radius:8px;
    background:var(--surface);
    color:var(--text);
}

[data-theme="dark"] input,
[data-theme="dark"] textarea{
    border:1px solid rgba(255,255,255,.12);
}

button[type="submit"]{
    background:var(--accent);
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

button[type="submit"]:hover{
    background:var(--accent-strong);
}

/* FOOTER */

footer{
    background:var(--footer-bg);
    color:var(--header-text);
    padding:40px 8%;
}

.footer-content{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}

.footer-content h3{
    margin-bottom:10px;
}

/* MOBILE */

@media(max-width:768px){

    header{
        flex-wrap:wrap;
        padding:10px 4%;
    }

    .logo{
        font-size:1.2rem;
    }

    nav{
        order:3;
        flex-basis:100%;
        margin-top:10px;
    }

    nav ul{
        flex-wrap:wrap;
        justify-content:center;
        gap:10px;
    }

    nav a{
        font-size:0.9rem;
    }

    .header-right{
        gap:15px;
    }

    .hero-content h1{
        font-size:2rem;
    }

    .btn{
        padding:12px 25px;
        font-size:1rem;
    }

    .today-meal-container{
        flex-direction:column;
        gap:20px;
    }

    .meal-image-section{
        width:100%;
    }

}

</style>
</head>

<body>

<!-- HEADER -->

<header>
    <div class="logo">
        <i class="fas fa-utensils"></i>
        BINUS Medan Canteen
    </div>

    <nav>
        <ul>
            <li><a href="#home"><i class="fas fa-house"></i>Home</a></li>
            <li><a href="menu.html"><i class="fas fa-utensils"></i>Menu</a></li>
            <li><a href="vote.html"><i class="fas fa-poll"></i>Vote</a></li>
            <li><a href="#contact"><i class="fas fa-phone-alt"></i>Contact</a></li>
        </ul>
    </nav>

    <div class="header-right">
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">
            <i class="fas fa-moon"></i>
        </button>
        <div class="profile">
            <i class="fas fa-user-circle"></i>
        </div>
    </div>
</header>

<!-- HERO -->

<section class="hero" id="home">

<div class="hero-content">

<h1>View The Menu</h1>
<p id="current-date"></p>
<a href="menu.html" class="btn"><i class="fas fa-utensils"></i> View Menu</a>

</div>

</section>

<!-- TODAY MEAL DETAILS -->

<section id="today">

<h2 class="section-title">
Today's Meal Details - <span id="current-day-name"></span>
</h2>

<div class="today-meal-container">
    
    <!-- Left Side: Image -->
    <div class="meal-image-section">
        <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400&h=300&fit=crop" alt="Today's Meal" class="meal-image">
    </div>

    <!-- Right Side: Info -->
    <div class="meal-info-section">
        <h3 id="meal-name" class="meal-name"></h3>
        <p id="meal-description" class="meal-description">
        </p>
    </div>

</div>

</section>

<!-- snacks removed -->

<!-- FEEDBACK -->

<section class="feedback">

<h2 class="section-title">
Live Student Reviews
</h2>
<div class="review-panel">
    <form id="review-form" class="review-form">
            <input id="review-name" type="text" placeholder="Your Name" required>
        <textarea id="review-text" rows="4" placeholder="Share your thoughts about today's meal..." required></textarea>
        <button type="submit" class="review-submit">Post Review</button>
    </form>
</div>

<div class="feedback-cards" id="review-cards"></div>

</section>

<!-- CONTACT -->

<section id="contact">

<h2 class="section-title">
Contact Us
</h2>

<form>

<input type="text" placeholder="Your Name">

<input type="email" placeholder="Your Email">

<textarea rows="5" placeholder="Your Message"></textarea>

<button type="submit">
Send Message
</button>

</form>

</section>

<footer>

<div class="footer-content">

<div>
<h3>BINUS Medan Canteen</h3>
<p>Daily meals for students.</p>
</div>

<div>
<h3>Opening Hours</h3>
<p><i class="fas fa-clock"></i> 08:00 - 18:00</p>
</div>

<div>
<h3>Contact</h3>
<p><i class="fas fa-envelope"></i> canteen@binus.ac.id</p>
<p><i class="fas fa-phone"></i> +62 812 3456 7890</p>
</div>

</div>

</footer>

<script src="menu-data.js"></script>
<script src="app.js"></script>

</body>
</html>
